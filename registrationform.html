<!DOCTYPE html>
<html>
    <head>
        <meta charshet="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Registration Form</title>
    
         <link rel="stylesheet"href="externalcss.css">
         <style>
            body{
                font-family: Arial, sans--serif;
                background-color:#005349;

            }
            h2 {
                text-align:center;
                color:navy;
            }

            form{
                width:800px;
                margin:auto;
                padding:30px;
                background-color:white;
                border:1px solid gray;
                border-radius:10px;
            }

            input,
            textarea,
            select{
                width:100%;
                padding:8px;
                margin-top:5px;
            }
         </style>
         </head>
    <body>
        <h2 style="text-decoration: underline;">
            Registration Form
        </h2>
      
        <form action="'#"method="post">
            <label for="fullname">Full Name:</label><br>
            <input type="text id"="fullname" name="fullname" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email"name="email"required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel"id="phone"name="phone"required><br><br>

            <label>Gender</label>
            <input type="radio"id="male" name="gender"Value="Male">
            <label for="male">Male</label>

            <input type="radio"id="female" name="gender"Value="FeMale">
            <label for="female">Female</label>

            <input type="radio"id="other" name="gender"Value="Other">
            <label for="other">other</label><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date"id="dob"name="dob"required><br><br>
            
            <label for="password">Passsword:</label><br>
            <input type="password" id="password"name="password"required><br><br>


            <label for="confirmpassword">Confirm  Passsword:</label><br>
            <input type="confirmmpassword" id="Confirm password"name="confirmpassword"required><br><br>

            <label>Department:</label>
            <select id="deaprtment"name="department">
                <option value="CSE">CSE</option>
                 <option value="EEE">EEE</option>
                  <option value="BBA">BBA</option>
                   <option value="ENGLISH">ENGLISH</option>
            </select><br><br>

            <input type="checkbox" id="terms"name="terms" required>
            <label for="terms">I agree to the terms and conditions</label><br><br>
           <br><br>
            <input type="submit"value="Register" style="background-color:green;color:white;">
            <input type="reset"value="Reset" style="background-color:red;color:white;">


        </form>
    </body>
</html>

label{
    font-weight:bold;
}

textarea {
    resize:none;
}

[input type="radio"]{
    width:auto;

}
[input type="checkbox"]{
    width:auto;
}
